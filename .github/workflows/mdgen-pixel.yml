name: mdgen pixel test

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  pixel-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Run pixel test
        working-directory: mdgen
        run: npm run test:pixel

      - name: Write workflow summary
        if: always()
        run: bash mdgen/scripts/write-github-summary.sh

      - name: Upload generated PDFs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mdgen-pdfs
          path: mdgen/output/*.pdf
          if-no-files-found: error
          retention-days: 14

      - name: Upload generated HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mdgen-html
          path: mdgen/output/*.html
          if-no-files-found: error
          retention-days: 14

      - name: Upload pixel report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mdgen-pixel-report
          path: |
            mdgen/output/pixel-report.md
            mdgen/output/pixel-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload pixel comparison assets
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mdgen-pixel-assets
          path: mdgen/output/compare
          if-no-files-found: error
          retention-days: 14

      - name: Upload complete mdgen output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mdgen-output-all
          path: mdgen/output
          if-no-files-found: error
          retention-days: 14
