name: mdgen pixel test

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  pixel-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Run lint
        working-directory: mdgen
        run: npm run lint

      - name: Run pixel test
        working-directory: mdgen
        run: npm run test:pixel

      - name: Write workflow summary
        if: always()
        run: bash mdgen/scripts/write-github-summary.sh

      - name: Upload generated PDF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generated-pdf
          path: mdgen/output/thesis-real.pdf
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Upload pixel comparison assets
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mdgen-pixel-assets
          path: mdgen/output/compare
          if-no-files-found: error
          retention-days: 14
